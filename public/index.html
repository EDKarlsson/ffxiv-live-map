<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FFXIV Live Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
	:root { color-scheme: dark; }
	html, body { margin: 0; height: 100%; background: #15171c; color: #e6e6e6; font-family: system-ui, sans-serif; }
	#map { height: 100%; background: #15171c; }
	#hud {
		position: absolute; top: 10px; right: 10px; z-index: 1000;
		background: rgba(20, 22, 28, 0.9); border: 1px solid #333; border-radius: 8px;
		padding: 10px 14px; font-size: 13px; line-height: 1.5; width: 250px;
		max-height: calc(100vh - 40px); overflow-y: auto;
	}
	#hud .zone { font-weight: 600; }
	#hud .muted { color: #9aa0aa; }
	#hud select { width: 100%; background: #23262e; color: #e6e6e6; border: 1px solid #444; border-radius: 4px; padding: 3px; margin: 4px 0; }
	#hud input[type="text"] { width: 100%; box-sizing: border-box; background: #23262e; color: #e6e6e6; border: 1px solid #444; border-radius: 4px; padding: 3px 6px; margin: 4px 0; }
	#hud label { cursor: pointer; }
	#hud details { margin-top: 6px; border-top: 1px solid #333; padding-top: 6px; }
	#hud summary { cursor: pointer; font-weight: 600; }
	#status { position: absolute; bottom: 10px; left: 10px; z-index: 1000; font-size: 12px;
		padding: 4px 10px; border-radius: 6px; background: rgba(20,22,28,.85); border: 1px solid #333; }
	#status.ok { color: #7fd17f; } #status.bad { color: #e07a7a; }
	.player-dot {
		width: 14px; height: 14px; border-radius: 50%;
		background: #4da3ff; border: 2px solid #fff; box-shadow: 0 0 8px #4da3ff;
	}
	.node-icon img { width: 26px; height: 26px; filter: drop-shadow(0 0 3px rgba(0,0,0,.8)); }
	.node-up img { filter: drop-shadow(0 0 6px #ffd470); }
	.mob-dot {
		min-width: 14px; height: 14px; border-radius: 8px; padding: 0 3px; box-sizing: border-box;
		background: #c0392b; border: 1px solid #f0b1a8; color: #fff;
		font: 700 10px/12px system-ui; text-align: center;
	}
	.mob-dot.fate { background: #8e44ad; }
	.npc-dot {
		width: 12px; height: 12px; border-radius: 50%;
		background: #2e86c1; border: 2px solid #d6eaf8;
	}
	#timedPanel { max-height: 30vh; overflow-y: auto; }
	#timedPanel .trow, #mobList .mrow { cursor: pointer; padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
	#timedPanel .trow:hover, #mobList .mrow:hover { color: #fff; }
	#timedPanel .up { color: #8fd98f; }
	#timedPanel .down { color: #9aa0aa; }
	#mobList { max-height: 35vh; overflow-y: auto; }
	#mobList .lvl { color: #9aa0aa; font-size: 11px; }
	.leaflet-popup-content-wrapper, .leaflet-popup-tip {
		background: #1d2026; color: #e6e6e6; border: 1px solid #333;
	}
	.leaflet-popup-content a { color: #6db3ff; text-decoration: none; }
	.leaflet-popup-content .nlvl { color: #9aa0aa; font-size: 11px; }
	.leaflet-popup-content .timed { color: #e8c36a; font-size: 11px; }
	.leaflet-container { background: #15171c; }
</style>
</head>
<body>
<div id="map"></div>
<div id="hud">
	<div class="zone" id="zoneName">No zone yet</div>
	<select id="mapPicker"></select>
	<label><input type="checkbox" id="followToggle" checked> Follow player</label>
	<div id="coords">X: –  Y: –</div>
	<div id="nodeCount" class="muted"></div>
	<div id="etClock" class="muted">ET --:--</div>
	<details open><summary>Timed nodes</summary><div id="timedPanel"></div></details>
	<details><summary>Monsters</summary>
		<input type="text" id="mobSearch" placeholder="filter mobs…">
		<div id="mobList" class="muted">no data for this map</div>
	</details>
	<details><summary>NPCs</summary>
		<input type="text" id="npcSearch" placeholder="search NPCs…">
		<div id="npcInfo" class="muted"></div>
	</details>
</div>
<div id="status" class="bad">connecting…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const IMG = 2048; // xivapi map images are 2048x2048

const map = L.map("map", { crs: L.CRS.Simple, minZoom: -2, maxZoom: 3, zoomSnap: 0.25 });
const bounds = [[0, 0], [IMG, IMG]];
map.fitBounds(bounds);

let overlay = null;
let marker = null;
let viewedMap = null;  // map entry currently displayed
let playerMap = null;  // map entry the player is actually in
let lastPos = null;
let follow = true;

// Leaflet Simple CRS: latlng = [y-up, x]; image pixel y grows downward.
const px2ll = (x, y) => [IMG - y, x];

// In-game map coord -> image pixel (inverse of the daemon formula)
function coordToPx(coord, sizeFactor) {
	const c = sizeFactor / 100;
	return ((coord - 1) * 2048 * c) / 41;
}
const coordLL = (x, y) => px2ll(coordToPx(x, viewedMap.size_factor), coordToPx(y, viewedMap.size_factor));

// --- Gathering node layers ----------------------------------------------------
// Node type enum + icons: Teamcraft nodeTypeName/nodeTypeIcon pipes.
const TYPE_NAMES = ["Mineral (MIN)", "Rocky (MIN)", "Tree (BTN)", "Vegetation (BTN)", "Fishing", "Spearfishing"];
const ICONS = ["060438", "060437", "060433", "060432", "060445", "060465"];
const TIMED_ICONS = ["060464", "060463", "060462", "060461", "060445", "060466"];
const iconUrl = (n) => `https://xivapi.com/i/060000/${(n.limited || n.spawns.length ? TIMED_ICONS : ICONS)[n.type]}.png`;

const layers = {
	min: L.layerGroup().addTo(map),
	btn: L.layerGroup().addTo(map),
	fsh: L.layerGroup(),
	fates: L.layerGroup(),
	npcs: L.layerGroup().addTo(map),
};
L.control.layers(null, {
	"Miner nodes": layers.min,
	"Botanist nodes": layers.btn,
	"Fishing spots": layers.fsh,
	"FATEs": layers.fates,
}, { collapsed: true }).addTo(map);

// --- Eorzea Time (math per ffxiv-node-timer: 1 ET hour = 175 real seconds) ----
const ET_MULT = 3600 / 175;
const etHoursNow = () => (Date.now() / 1000) * ET_MULT / 3600 % 24;

function nodeStatus(n) {
	const cur = etHoursNow();
	const durH = n.duration / 60; // ET minutes
	let best = null;
	for (const h of n.spawns) {
		const sinceOpen = (cur - h + 24) % 24;
		if (sinceOpen < durH) return { up: true, secsLeft: (durH - sinceOpen) * 175 };
		const untilOpen = (h - cur + 24) % 24;
		if (!best || untilOpen < best) best = untilOpen;
	}
	return { up: false, secsLeft: best * 175 };
}

const fmtMins = (s) => s >= 3600 ? `${Math.floor(s / 3600)}h${Math.round((s % 3600) / 60)}m` : `${Math.max(0, Math.round(s / 60))}m`;

let timedMarkers = []; // [{ n, mk, ll }]

function tick() {
	const cur = etHoursNow();
	document.getElementById("etClock").textContent =
		`ET ${String(Math.floor(cur)).padStart(2, "0")}:${String(Math.floor(cur * 60 % 60)).padStart(2, "0")}`;
	const rows = timedMarkers.map(({ n, mk, ll }) => {
		const st = nodeStatus(n);
		mk.setOpacity(st.up ? 1 : 0.45);
		const el = mk.getElement();
		if (el) el.classList.toggle("node-up", st.up);
		return { n, ll, st };
	}).sort((a, b) => (a.st.up === b.st.up) ? a.st.secsLeft - b.st.secsLeft : (a.st.up ? -1 : 1));
	document.getElementById("timedPanel").innerHTML = rows.map(({ n, st }, i) =>
		`<div class="trow ${st.up ? "up" : "down"}" data-i="${i}">` +
		`${st.up ? "● UP" : "○"} Lv${n.level} ${n.items[0]?.name ?? "?"} — ${st.up ? `${fmtMins(st.secsLeft)} left` : `in ${fmtMins(st.secsLeft)}`}</div>`
	).join("") || `<span class="muted">none on this map</span>`;
	[...document.querySelectorAll("#timedPanel .trow")].forEach((el) => {
		el.onclick = () => {
			const { ll, n } = rows[Number(el.dataset.i)];
			map.flyTo(ll, 1);
			timedMarkers.find((t) => t.n === n)?.mk.openPopup();
		};
	});
}
setInterval(tick, 1000);

function nodePopup(n) {
	const gt = (i) => `<a href="https://www.garlandtools.org/db/#item/${i.id}" target="_blank">${i.name}</a>`;
	const items = n.items.map(gt).join(", ");
	const hidden = n.hiddenItems.length ? `<br><span class="nlvl">Hidden: ${n.hiddenItems.map(gt).join(", ")}</span>` : "";
	let timed = "";
	if (n.spawns.length) {
		const st = nodeStatus(n);
		timed = `<br><span class="timed">Spawns ET ${n.spawns.map((h) => `${h}:00`).join(", ")} for ${n.duration / 60} ET h${n.ephemeral ? " (ephemeral)" : ""}${n.legendary ? " (legendary)" : ""}<br>` +
			(st.up ? `● UP — ${fmtMins(st.secsLeft)} real time left` : `○ next window in ${fmtMins(st.secsLeft)} (real)`) + `</span>`;
	}
	return `<b>${TYPE_NAMES[n.type]}</b> <span class="nlvl">Lv${n.level} · (${n.x}, ${n.y})</span><br>${items}${hidden}${timed}`;
}

async function loadNodes(m) {
	Object.values(layers).forEach((l) => l.clearLayers());
	timedMarkers = [];
	const nodes = await fetch(`/nodes?map=${m.id}`).then((r) => r.json());
	for (const n of nodes) {
		const ll = coordLL(n.x, n.y);
		const mk = L.marker(ll, {
			icon: L.divIcon({ className: "node-icon", html: `<img src="${iconUrl(n)}">`, iconSize: [26, 26], iconAnchor: [13, 13] }),
		}).bindPopup(() => nodePopup(n));
		if (n.spawns.length) timedMarkers.push({ n, mk, ll });
		const group = n.type <= 1 ? layers.min : n.type <= 3 ? layers.btn : layers.fsh;
		group.addLayer(mk);
		if (n.radius > 0) {
			group.addLayer(L.circle(ll, {
				radius: n.radius * (m.size_factor / 100),
				color: n.type <= 1 ? "#e8a33d" : n.type <= 3 ? "#6dbf6d" : "#5da9d6",
				weight: 2, opacity: 0.6, dashArray: "1 6", lineCap: "round",
				fillOpacity: 0.07, interactive: false,
			}));
		}
	}
	document.getElementById("nodeCount").textContent = `${nodes.length} gathering nodes`;
}

// --- Monsters (A Realm Remapped-style per-mob toggles) -------------------------
let mobData = [];                 // /monsters payload for viewed map
const mobLayers = new Map();      // mobId -> layerGroup
const mobChecked = new Set();     // persists across maps for same-named? no: per map ids; reset on map change

function clusterPoints(points, grid = 0.6) {
	const cells = new Map();
	for (const [x, y, fate] of points) {
		const key = `${Math.round(x / grid)}:${Math.round(y / grid)}`;
		const c = cells.get(key) ?? { x: 0, y: 0, n: 0, fate: 0 };
		c.x += x; c.y += y; c.n++; c.fate += fate;
		cells.set(key, c);
	}
	return [...cells.values()].map((c) => ({ x: c.x / c.n, y: c.y / c.n, n: c.n, fate: c.fate > 0 }));
}

function showMob(mob) {
	if (mobLayers.has(mob.id)) return;
	const g = L.layerGroup().addTo(map);
	for (const cl of clusterPoints(mob.points)) {
		g.addLayer(L.marker(coordLL(cl.x, cl.y), {
			icon: L.divIcon({
				className: "",
				html: `<div class="mob-dot${cl.fate ? " fate" : ""}">${cl.n > 1 ? cl.n : ""}</div>`,
				iconSize: [14, 14], iconAnchor: [7, 7],
			}),
		}).bindTooltip(`${mob.name} (Lv${mob.lmin}${mob.lmax !== mob.lmin ? "–" + mob.lmax : ""})`)
			.bindPopup(
				`<b>${mob.name}</b> <span class="nlvl">Lv${mob.lmin}${mob.lmax !== mob.lmin ? "–" + mob.lmax : ""} · ${mob.points.length} spawn points${cl.fate ? " · FATE" : ""}</span><br>` +
				`<a href="https://ffxivteamcraft.com/db/en/mob/${mob.id}" target="_blank">Teamcraft DB</a>`
			));
	}
	mobLayers.set(mob.id, g);
}

function hideMob(id) {
	mobLayers.get(id)?.remove();
	mobLayers.delete(id);
}

function renderMobList() {
	const q = document.getElementById("mobSearch").value.trim().toLowerCase();
	const list = document.getElementById("mobList");
	const rows = mobData.filter((m) => !q || m.name.toLowerCase().includes(q));
	list.innerHTML = rows.length
		? rows.map((m) =>
			`<div class="mrow"><label><input type="checkbox" data-id="${m.id}" ${mobChecked.has(m.id) ? "checked" : ""}> ` +
			`${m.name} <span class="lvl">Lv${m.lmin}${m.lmax !== m.lmin ? "–" + m.lmax : ""} ·${m.points.length}</span></label></div>`).join("")
		: `<span class="muted">${mobData.length ? "no match" : "no data for this map"}</span>`;
	[...list.querySelectorAll("input[type=checkbox]")].forEach((cb) => {
		cb.onchange = () => {
			const id = Number(cb.dataset.id);
			const mob = mobData.find((m) => m.id === id);
			if (cb.checked) { mobChecked.add(id); showMob(mob); }
			else { mobChecked.delete(id); hideMob(id); }
		};
	});
}
document.getElementById("mobSearch").oninput = renderMobList;

async function loadMonsters(m) {
	mobLayers.forEach((g) => g.remove());
	mobLayers.clear();
	mobChecked.clear();
	mobData = await fetch(`/monsters?map=${m.id}`).then((r) => r.json());
	renderMobList();
}

// --- FATEs ----------------------------------------------------------------------
async function loadFates(m) {
	layers.fates.clearLayers();
	const fates = await fetch(`/fates?map=${m.id}`).then((r) => r.json());
	for (const f of fates) {
		layers.fates.addLayer(L.marker(coordLL(f.x, f.y), {
			icon: L.divIcon({ className: "node-icon", html: `<img src="https://xivapi.com/i/060000/${f.icon}.png">`, iconSize: [26, 26], iconAnchor: [13, 13] }),
		}).bindTooltip(`${f.name} (Lv${f.level})`)
			.bindPopup(`<b>${f.name}</b> <span class="nlvl">FATE Lv${f.level} · (${f.x}, ${f.y})</span>`));
	}
}

// --- NPCs (search-driven: 23k total, render only matches) -------------------------
let npcData = [];
function renderNpcs() {
	layers.npcs.clearLayers();
	const q = document.getElementById("npcSearch").value.trim().toLowerCase();
	const info = document.getElementById("npcInfo");
	if (q.length < 2) { info.textContent = `${npcData.length} NPCs on this map — type 2+ chars`; return; }
	const hits = npcData.filter((n) => n.name.toLowerCase().includes(q) || n.title.toLowerCase().includes(q));
	for (const n of hits.slice(0, 100)) {
		layers.npcs.addLayer(L.marker(coordLL(n.x, n.y), {
			icon: L.divIcon({ className: "", html: `<div class="npc-dot"></div>`, iconSize: [12, 12], iconAnchor: [6, 6] }),
		}).bindTooltip(`${n.name}${n.title ? ` — ${n.title}` : ""}`)
			.bindPopup(`<b>${n.name}</b>${n.title ? ` <span class="nlvl">${n.title}</span>` : ""}<br><span class="nlvl">(${n.x}, ${n.y})</span><br><a href="https://ffxivteamcraft.com/db/en/npc/${n.id}" target="_blank">Teamcraft DB</a>`));
	}
	info.textContent = `${hits.length} match${hits.length === 1 ? "" : "es"}${hits.length > 100 ? " (showing 100)" : ""}`;
	if (hits.length === 1) map.flyTo(coordLL(hits[0].x, hits[0].y), 1);
}
async function loadNpcs(m) {
	layers.npcs.clearLayers();
	npcData = await fetch(`/npcs?map=${m.id}`).then((r) => r.json());
	renderNpcs();
}
document.getElementById("npcSearch").oninput = renderNpcs;

// --- Map browser ---------------------------------------------------------------
async function buildPicker() {
	const idx = await fetch("/maps").then((r) => r.json());
	const groups = {};
	for (const m of idx) (groups[m.region] ??= []).push(m);
	const sel = document.getElementById("mapPicker");
	sel.innerHTML = `<option value="">— select a map —</option>` + Object.keys(groups).sort().map((region) =>
		`<optgroup label="${region}">` + groups[region]
			.sort((a, b) => a.name.localeCompare(b.name) || a.index - b.index)
			.map((m) => `<option value="${m.id}">${m.name}${m.sub ? " — " + m.sub : ""}${m.index ? ` (${m.index})` : ""}</option>`).join("") +
		`</optgroup>`).join("");
	sel.onchange = async () => {
		if (!sel.value) return;
		setFollow(false);
		viewMap(await fetch(`/map?id=${sel.value}`).then((r) => r.json()));
	};
}
buildPicker();

function setFollow(v) {
	follow = v;
	document.getElementById("followToggle").checked = v;
	if (v && playerMap && viewedMap?.id !== playerMap.id) viewMap(playerMap);
}
document.getElementById("followToggle").onchange = (e) => setFollow(e.target.checked);

function viewMap(m) {
	if (!m || viewedMap?.id === m.id) { refreshMarker(); return; }
	viewedMap = m;
	if (overlay) { overlay.remove(); overlay = null; }
	overlay = L.imageOverlay(m.image, bounds).addTo(map);
	map.fitBounds(bounds);
	document.getElementById("zoneName").textContent = `Map #${m.id} (territory ${m.territory_id})`;
	document.getElementById("mapPicker").value = String(m.id);
	loadNodes(m).catch((e) => console.error("loadNodes failed:", e));
	loadMonsters(m).catch((e) => console.error("loadMonsters failed:", e));
	loadFates(m).catch((e) => console.error("loadFates failed:", e));
	loadNpcs(m).catch((e) => console.error("loadNpcs failed:", e));
	refreshMarker();
}

// --- Player position ------------------------------------------------------------
function refreshMarker() {
	const onViewed = lastPos && playerMap && viewedMap && playerMap.id === viewedMap.id;
	if (!onViewed) { marker?.remove(); marker = null; return; }
	const ll = px2ll(lastPos.pixelX, lastPos.pixelY);
	if (!marker) {
		marker = L.marker(ll, { icon: L.divIcon({ className: "player-dot", iconSize: [14, 14] }) }).addTo(map);
	} else {
		marker.setLatLng(ll);
	}
}

function setPos(p) {
	lastPos = p;
	refreshMarker();
	document.getElementById("coords").textContent = `X: ${p.mapX.toFixed(1)}  Y: ${p.mapY.toFixed(1)}`;
}

function handleZone(m) {
	playerMap = m;
	lastPos = null;
	if (follow && m) viewMap(m);
	else refreshMarker();
}

// --- WebSocket -------------------------------------------------------------------
function connect() {
	const ws = new WebSocket(`ws://${location.host}`);
	const status = document.getElementById("status");
	ws.onopen = () => { status.textContent = "live"; status.className = "ok"; };
	ws.onclose = () => {
		status.textContent = "disconnected — retrying"; status.className = "bad";
		setTimeout(connect, 2000);
	};
	ws.onmessage = (ev) => {
		const msg = JSON.parse(ev.data);
		if (msg.type === "state") {
			if (msg.state.map) handleZone(msg.state.map);
			if (msg.state.pos) setPos(msg.state.pos);
		} else if (msg.type === "zone") {
			handleZone(msg.map);
		} else if (msg.type === "pos") {
			setPos(msg.pos);
		}
	};
}
connect();
</script>
</body>
</html>
